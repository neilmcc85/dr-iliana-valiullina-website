  <circle cx="512" cy="512" r="402" fill="none" stroke="#B89778" stroke-width="26"/>
  <circle cx="512" cy="512" r="366" fill="none" stroke="#FAF9F6" stroke-width="8"/>
  <text x="449" y="672"
