<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Page Not Found • Dr. Iliana Valiullina</title>
    <link rel="icon" type="image/jpeg" href="/images/logo-v2.jpg">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap">
    <script>
        (() => {
            try {
                const savedTheme = localStorage.getItem('site-theme');
                const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.dataset.theme = savedTheme || (prefersDark ? 'dark' : 'light');
            } catch {
                document.documentElement.dataset.theme = 'light';
            }
        })();
    </script>
    <link rel="stylesheet" href="/css/site.css">
</head>
<body class="min-h-screen bg-[#FAF9F6] text-[#2D3748] flex items-center justify-center px-6">
    <main class="max-w-lg text-center">
        <img src="/images/logo-v2.jpg" alt="" width="88" height="88" class="mx-auto rounded-full border border-[#B89778] mb-8">
        <p class="text-xs font-semibold tracking-[3px] text-[#B89778] uppercase">404</p>
        <h1 class="mt-3 text-4xl font-semibold text-[#0D3B66] heading-serif">Page not found</h1>
        <p class="mt-4 text-[#4B5563] leading-relaxed">The page you are looking for may have moved, or the link may be incorrect.</p>
        <a href="/" class="mt-8 inline-flex items-center justify-center px-6 py-3 rounded-2xl bg-[#0D3B66] text-white font-semibold hover:bg-[#0A2F52]">
            Return home
        </a>
    </main>
    <script>
        (() => {
            const root = document.documentElement;
            const storageKey = 'site-theme';

            function storedTheme() {
                try {
                    return localStorage.getItem(storageKey);
                } catch {
                    return null;
                }
            }

            function systemTheme() {
                return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }

            function activeTheme() {
                return storedTheme() || systemTheme();
            }

            function setTheme(theme, persist) {
                root.dataset.theme = theme;
                root.style.colorScheme = theme;
                if (persist) {
                    try {
                        localStorage.setItem(storageKey, theme);
                    } catch {}
                }
                document.querySelectorAll('.theme-toggle').forEach((button) => {
                    const isDark = theme === 'dark';
                    button.textContent = isDark ? 'Light' : 'Dark';
                    button.setAttribute('aria-label', isDark ? 'Switch to light mode' : 'Switch to dark mode');
                    button.setAttribute('aria-pressed', String(isDark));
                });
            }

            setTheme(activeTheme(), false);

            document.querySelectorAll('.theme-toggle').forEach((button) => {
                button.addEventListener('click', () => {
                    setTheme(root.dataset.theme === 'dark' ? 'light' : 'dark', true);
                });
            });

            if (window.matchMedia) {
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
                    if (!storedTheme()) setTheme(systemTheme(), false);
                });
            }
        })();
    </script>
</body>
</html>
