name: Build site CSS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build CSS
        run: npm run build

      - name: Verify CSS is committed on pull requests
        if: github.event_name == 'pull_request'
        run: git diff --exit-code public/css/site.css

      - name: Commit and push built CSS
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/css/site.css
          if git diff --staged --quiet; then
            echo "CSS already up to date."
          else
            git commit -m "chore: rebuild site CSS"
            git push
          fi
